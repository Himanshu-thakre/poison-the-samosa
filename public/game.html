<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
        integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preload" as="image" href="./rsc/eaten.png">
    <link rel="preload" as="image" href="./rsc/poison.png">
    <title>poison the samosa</title>

<body>

    <div class="game-over-window">
        <div id="message-div">
            <p id="g-o">GAME OVER</p>
            <div id="middle-div">
                <p id="game-over-message">Opponent Dar Gaya</p>
                <p id="winner">WINNER : HIMANSHU</p>
            </div>
            <button id="game-over-btn">THIK HAI</button>
        </div>
    </div>


    <div class="status">
        <div id="player1">
            <div id="avatar1"></div>
            <div id="name1"></div>
        </div>
        <div id="title">
            <p>GAME <sub>(By HT)</sub></p>
        </div>
        <div id="player2">
            <div id="name2"></div>
            <div id="avatar2"></div>
        </div>
    </div>

    <div class="updates">
        <div id="poisoning">
            <p>TAP THE SAMOSA TO POISON IT</p>
            <p id="poisoned-counter">POISONED: 0</p>
        </div>
        <div id="poisoned">
            <p id="turn">Opponent's View</p>
            <p id="ate-poisoned">ATE-POISONED: 0</p>
        </div>
    </div>

    <div class="board1">
        <button id="1"></button>
        <button id="2"></button>
        <button id="3"></button>
        <button id="4"></button>
        <button id="5"></button>
        <button id="6"></button>
        <button id="7"></button>
        <button id="8"></button>
        <button id="9"></button>
        <button id="10"></button>
        <button id="11"></button>
        <button id="12"></button>
        <button id="13"></button>
        <button id="14"></button>
        <button id="15"></button>
        <button id="16"></button>
    </div>

    <div class="button-area">
        <div class="poison-instrctions">
            <p id="instrction"></p>
        </div>

        <button id="poison-btn"><i class="fa-solid fa-skull-crossbones"></i> POISON <i
                class="fa-solid fa-skull-crossbones"></i></button>
    </div>
