<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>create-room</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <div class="title">
        <p>GAME <sub>(By HT)</sub></p>
    </div>

    <div class="room-info">
        <div id="table">
            <table>
                <tr>
                    <th>PLAYERS</th>
                </tr>
                <tr>
                    <td id="p1"></td>
                </tr>
                <tr>
                    <td id="p2"></td>
                </tr>
            </table>
        </div>
        <div id="room-status">
            <p id="message">WAITING FOR OTHER PLAYER</p>
            <p id="room-code"></p>
        </div>
        <!-- <div id="start">
            <button id="start-button">Let's Go</button>
        </div> -->
    </div>

    <script src="Script.js"></script>
</body>

</html>
